<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>元素合成原型</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: #eee;
            padding: 20px;
        }

        h2 {
            color: #6cf;
        }

        button {
            margin: 4px;
            padding: 8px;
            cursor: pointer;
        }

        .box {
            border: 1px solid #444;
            padding: 10px;
            margin: 10px 0;
        }

        .element {
            display: inline-block;
            padding: 5px 10px;
            margin: 3px;
            background: #333;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <h2>魔能：<span id="mana">0</span></h2>

    <div class="box">
        <h3>初始元素</h3>
        <div id="tier1"></div>
    </div>

    <div class="box">
        <h3>中階元素</h3>
        <div id="tier2"></div>
    </div>

    <div class="box">
        <h3>高階元素</h3>
        <div id="tier3"></div>
    </div>

    <div class="box">
        <h3>合成區</h3>
        <div id="selected"></div>
        <button onclick="craft()">合成</button>
    </div>

    <script>
        // ===== 基礎資料 =====
        let mana = 0;

        const tier1 = {
            "地": "地",
            "水": "水",
            "火": "火",
            "風": "風"
        };

        const tier2 = {
            "地+水": "泥沼",
            "地+火": "熔岩",
            "地+風": "沙塵",
            "水+火": "蒸氣",
            "水+風": "霧氣",
            "火+風": "雷電"
        };

        const tier3 = {
            "地+水+火": "熔潮核團",
            "地+水+風": "霧塵核團",
            "地+火+風": "灼嵐核團",
            "水+火+風": "雷霧核團"
        };

        let selected = [];

        // ===== UI =====
        function render() {
            document.getElementById("mana").innerText = mana;

            renderGroup("tier1", tier1);
            renderGroup("tier2", tier2);
            renderGroup("tier3", tier3);

            document.getElementById("selected").innerHTML =
                selected.map(e => `<span class="element">${e}</span>`).join("");
        }

        function renderGroup(id, group) {
            let div = document.getElementById(id);
            div.innerHTML = "";

            for (let key in group) {
                let btn = document.createElement("button");
                btn.innerText = group[key];
                btn.onclick = () => select(key);
                div.appendChild(btn);
            }
        }

        // ===== 選擇元素 =====
        function select(el) {
            if (selected.length < 3) {
                selected.push(el);
            }
            render();
        }

        // ===== 合成 =====
        function craft() {
            selected.sort();

            let key = selected.join("+");

            let result = tier3[key] || tier2[key] || null;

            if (result) {
                mana += 10;

                alert("成功合成：" + result);
            } else {
                alert("無效合成");
            }

            selected = [];
            render();
        }

        // ===== 魔能系統 =====
        setInterval(() => {
            mana += 1;
            render();
        }, 1000);

        render();
    </script>

</body>

</html>
